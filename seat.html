<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>좌석 선택 - JuneJun Birthday Cafe</title>
<style>
  body {
    margin:0; font-family:Pretendard, Arial, sans-serif;
    background:#f0f2f5; display:flex; justify-content:center; align-items:center;
    min-height:100vh;
  }
  .seat-container {
    background:#fff; padding:40px; border-radius:20px;
    text-align:center; max-width:960px; box-shadow: 0 10px 40px rgba(0,0,0,0.1);
  }
  h2 { margin-bottom:24px; color: #1a304d; font-weight: 800; }
  .stage { 
    background:#334155; font-weight:700; padding:12px;
    border-radius:8px; margin:0 auto 30px auto; width:50%; color: #fff; font-size: 13px;
    letter-spacing: 2px;
  }
  .seat-grid {
    display:grid; grid-template-columns: repeat(12, 26px); /* 크기 축소 */
    gap:8px; justify-content:center; margin-bottom:30px;
  }
  
  /* [기본 좌석] */
  .seat {
    width:26px; height:26px; border-radius:50%;
    background:#ffffff; cursor:pointer; transition: all 0.3s ease;
    position: relative; border: 1.5px solid #cbd5e1;
  }

  /* [선택된 좌석] */
  .seat.selected { 
    background:#1a304d !important; 
    border-color: #1a304d !important;
    transform: scale(1.1);
  }
  .seat.selected::after {
    content: '✓'; color: white; font-size: 14px; font-weight: bold;
    position: absolute; top:50%; left:50%; transform: translate(-50%, -50%);
  }
  
  /* [비활성화 좌석 - 확실한 중간 회색] */
  .seat.disabled { 
    background:#94a3b8 !important; 
    border-color: #94a3b8 !important;
    cursor:default; 
  }

  /* [은은한 강조 - 느린 호흡 효과 (덜컹거림 해결 버전)] */
  .seat.last-glow:not(.disabled):not(.selected) {
    background-color: #f8fafc !important;
    
    /* 1. border 대신 box-shadow 사용 (테두리 부피 밀림 현상 방지) */
    border: 1.5px solid #64748b !important; /* 기본 테두리 굵기 유지 */
    box-shadow: 0 0 10px rgba(71, 85, 105, 0.5); /* 대신 은은한 그림자 추가 */
    
    animation: gentle-breath 2.5s infinite ease-in-out !important;
  }

  @keyframes gentle-breath {
    0% { 
      transform: scale(1); 
      border-color: #94a3b8; 
      box-shadow: 0 0 5px rgba(71, 85, 105, 0.3); 
    }
    50% { 
      transform: scale(1.05); /* 미세하게 커짐 */
      border-color: #475569; 
      box-shadow: 0 0 15px rgba(71, 85, 105, 0.8); /* 그림자가 진해짐 */
    }
    100% { 
      transform: scale(1); 
      border-color: #94a3b8; 
      box-shadow: 0 0 5px rgba(71, 85, 105, 0.3); 
    }
  }
  .selected-seat { font-weight:700; margin-bottom:30px; color: #1a304d; font-size: 16px; min-height: 24px; }
  .reserve-btn {
    padding:14px 36px; background:#1a304d; color:#fff;
    border:none; border-radius:10px; cursor:pointer; font-size:15px; font-weight:700;
  }
</style>
</head>
<body>

<div class="seat-container">
  <h2>STEP 2. 좌석 선택</h2>
  <div class="stage">STAGE</div>
  <div class="seat-grid" id="seatGrid"></div>
  <div class="selected-seat" id="selectedSeat">선택 좌석: 없음</div>
  <button class="reserve-btn" onclick="confirmSeat()">다음 단계</button>
</div>

<script>
  const seatGrid = document.getElementById('seatGrid');
  const selectedSeat = document.getElementById('selectedSeat');
  const rows = 10;
  const cols = 12;
  const disabledSeats = ['1-3','1-5','2-2','2-6','3-4','3-7','7-3','7-5','7-7','8-2','8-8','9-4','9-6','10-3','10-7','10-10'];
  const hRow = 8;
  const hCol = 6;
  const seats = [];

  for(let r=1; r<=rows; r++){
    for(let c=1; c<=cols; c++){
      const seat = document.createElement('div');
      seat.className = 'seat';
      seat.dataset.row = r;
      seat.dataset.col = c;
      const seatKey = r + '-' + c;
      if(disabledSeats.includes(seatKey)) seat.classList.add('disabled');

      seat.addEventListener('click', () => {
        if(seat.classList.contains('disabled')) return;
        
        if(r === hRow && c === hCol){
          // 재클릭 시 취소 기능
          if(seat.classList.contains('selected')) {
            seat.classList.remove('selected');
            selectedSeat.textContent = '선택 좌석: 없음';
          } else {
            document.querySelectorAll('.seat.selected').forEach(s => s.classList.remove('selected'));
            seat.classList.add('selected');
            seat.classList.remove('last-glow'); // 선택하면 강조 제거
            selectedSeat.textContent = '선택 좌석: H22';
          }
        } else {
          alert('[이미 선택된 좌석입니다.]');
          animateSeatsRandom();
        }
      });
      seats.push(seat);
      seatGrid.appendChild(seat);
    }
  }

  function animateSeatsRandom(){
    const seatsToAnimate = seats.filter(s => {
      const r = parseInt(s.dataset.row);
      const c = parseInt(s.dataset.col);
      return !(r===hRow && c===hCol) && !s.classList.contains('disabled');
    });

    for(let i=seatsToAnimate.length -1; i>0; i--){
      const j = Math.floor(Math.random() * (i+1));
      [seatsToAnimate[i], seatsToAnimate[j]] = [seatsToAnimate[j], seatsToAnimate[i]];
    }

    seatsToAnimate.forEach((s, idx) => {
      setTimeout(()=> {
        s.classList.add('disabled');
      }, idx * 15);
    });

    // 모든 좌석이 변한 후(약 1초 뒤)에 강조 효과 시작
    setTimeout(() => {
      checkLastOne();
    }, (seatsToAnimate.length * 15) + 800);
  }

  function checkLastOne() {
    const availableSeats = seats.filter(s => !s.classList.contains('disabled'));
    if (availableSeats.length === 1 && !availableSeats[0].classList.contains('selected')) {
      availableSeats[0].classList.add('last-glow');
    }
  }

  function confirmSeat(){
    if(selectedSeat.textContent.includes('H22')){
        window.location.href = "complete.html"; 
    } else {
        alert('좌석을 선택해주세요.');
    }
  }
</script>
</body>
</html>
