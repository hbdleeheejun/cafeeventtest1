<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>좌석 선택 - JuneJun Birthday Cafe</title>
<style>
  body {
    margin:0; font-family:Pretendard, Arial, sans-serif;
    background:#f4f7f6; display:flex; justify-content:center; align-items:center;
    min-height:100vh;
  }
  .seat-container {
    background:#fff; padding:40px; border-radius:20px;
    text-align:center; max-width:960px; box-shadow: 0 10px 30px rgba(36, 66, 107, 0.1);
  }
  h2 { margin-bottom:24px; color: #24426b; font-weight: 800; }
  .stage { 
    background:#e0e3e9; font-weight:700; padding:18px;
    border-radius:10px; margin:0 auto 30px auto; width:50%; color: #666; font-size: 14px;
  }
  .seat-grid {
    display:grid; grid-template-columns: repeat(12, 30px);
    gap:12px; justify-content:center; margin-bottom:30px;
  }
  .seat {
    width:30px; height:30px; border-radius:50%;
    background:#e2e8f0; cursor:pointer; transition: all 0.3s ease;
    position: relative; border: 1px solid transparent;
  }

  /* ✨ [수정] H22 선택 시 확실하게 색 변화 (진한 남색 + 부드러운 테두리) */
  .seat.selected { 
    background:#24426b !important; 
    transform: scale(1.15); 
    border: 2px solid rgba(255, 255, 255, 0.8) !important;
    box-shadow: 0 4px 10px rgba(36, 66, 107, 0.3);
    z-index: 5;
  }
  
  /* 비활성화된 좌석 (회색) */
  .seat.disabled { 
    background:#cbd5e1 !important; 
    cursor:default; 
    border: none !important; 
    transform: scale(1) !important;
    box-shadow: none !important;
    animation: none !important;
  }

  /* ✨ [수정] 마지막 한 자리 강조 디자인 (차분한 블루 + 아주 느린 깜빡임) */
  .seat.last-glow:not(.disabled):not(.selected) {
    background-color: #ffffff !important;
    border: 2px solid #a3b8d9 !important; /* 차분한 연블루 테두리 */
    box-shadow: 0 0 10px rgba(36, 66, 107, 0.2); /* 은은하고 어두운 광채 */
    animation: slow-fade 3s infinite ease-in-out !important; /* 3초 주기로 아주 느리게 */
    z-index: 10;
  }

  /* ✨ [수정] 눈 안 아픈 아주 느린 애니메이션 */
  @keyframes slow-fade {
    0% { opacity: 0.5; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.08); }
    100% { opacity: 0.5; transform: scale(1); }
  }

  .selected-seat { font-weight:700; margin-bottom:30px; color: #24426b; min-height: 24px; font-size: 16px; }
  .reserve-btn {
    padding:14px 28px; background:#24426b; color:#fff;
    border:none; border-radius:12px; cursor:pointer; font-size:16px; font-weight:700;
    transition: background 0.2s;
  }
  .reserve-btn:hover { background:#1e3560; }
</style>
</head>
<body>

<div class="seat-container">
  <h2>STEP 2. 좌석 선택</h2>
  <div class="stage">STAGE</div>
  <div class="seat-grid" id="seatGrid"></div>
  <div class="selected-seat" id="selectedSeat">선택 좌석: 없음</div>
  <button class="reserve-btn" onclick="confirmSeat()">다음 단계</button>
</div>

<script>
  const seatGrid = document.getElementById('seatGrid');
  const selectedSeat = document.getElementById('selectedSeat');

  const rows = 10;
  const cols = 12;
  const disabledSeats = ['1-3','1-5','2-2','2-6','3-4','3-7','7-3','7-5','7-7','8-2','8-8','9-4','9-6','10-3','10-7','10-10'];
  
  const hRow = 8;
  const hCol = 6;
  const seats = [];

  // 좌석 생성
  for(let r=1; r<=rows; r++){
    for(let c=1; c<=cols; c++){
      const seat = document.createElement('div');
      seat.className = 'seat';
      seat.dataset.row = r;
      seat.dataset.col = c;
      const seatKey = r + '-' + c;

      if(disabledSeats.includes(seatKey)){
        seat.classList.add('disabled');
      }

      seat.addEventListener('click', () => {
        if(seat.classList.contains('disabled')) return;

        if(r === hRow && c === hCol){
          // 기존 선택된 게 있다면 해제
          document.querySelectorAll('.seat.selected').forEach(s => s.classList.remove('selected'));
          
          // ✨ [수정] H22 자리에 확실하게 'selected' 클래스 추가
          seat.classList.add('selected');
          
          // ✨ [수정] 선택 시 강조 광채(`last-glow`)는 삭제 (선택 표시가 더 중요하니까요)
          seat.classList.remove('last-glow');

          selectedSeat.textContent = '선택 좌석: H22';
        } else {
          alert('[이미 선택된 좌석입니다.]');
          animateSeatsRandom();
        }
      });

      seats.push(seat);
      seatGrid.appendChild(seat);
    }
  }

  function animateSeatsRandom(){
    const seatsToAnimate = seats.filter(s => {
      const r = parseInt(s.dataset.row);
      const c = parseInt(s.dataset.col);
      return !(r===hRow && c===hCol) && !s.classList.contains('disabled');
    });

    for(let i=seatsToAnimate.length -1; i>0; i--){
      const j = Math.floor(Math.random() * (i+1));
      [seatsToAnimate[i], seatsToAnimate[j]] = [seatsToAnimate[j], seatsToAnimate[i]];
    }

    seatsToAnimate.forEach((s, idx) => {
      setTimeout(()=> {
        s.classList.add('disabled');
        s.classList.remove('last-glow'); // 회색으로 변할 땐 광채 삭제
        checkLastOne();
      }, idx * 15);
    });
  }

  function checkLastOne() {
    const availableSeats = seats.filter(s => !s.classList.contains('disabled'));
    // 딱 1개(H22)만 남았고, 아직 선택 안 했을 때만 차분한 강조
    if (availableSeats.length === 1 && !availableSeats[0].classList.contains('selected')) {
      availableSeats[0].classList.add('last-glow');
    }
  }

  function confirmSeat(){
    if(selectedSeat.textContent.includes('H22')){
        window.location.href = "complete.html"; 
    } else {
        alert('좌석을 선택해주세요.');
    }
  }
</script>

</body>
</html>
