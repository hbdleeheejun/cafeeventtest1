<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>좌석 선택 - JuneJun Birthday Cafe</title>
<style>
  body {
    margin:0; font-family:Pretendard, Arial, sans-serif;
    background:#f0f2f5; display:flex; justify-content:center; align-items:center;
    min-height:100vh;
  }
  .seat-container {
    background:#fff; padding:40px; border-radius:20px;
    text-align:center; max-width:960px; box-shadow: 0 10px 40px rgba(0,0,0,0.1);
  }
  h2 { margin-bottom:24px; color: #1a304d; font-weight: 800; }
  .stage { 
    background:#334155; font-weight:700; padding:18px;
    border-radius:8px; margin:0 auto 30px auto; width:60%; color: #fff; font-size: 14px;
    letter-spacing: 2px;
  }
  .seat-grid {
    display:grid; grid-template-columns: repeat(12, 32px);
    gap:10px; justify-content:center; margin-bottom:30px;
  }
  
  /* [1. 기본 좌석 - 깨끗한 흰색] */
  .seat {
    width:32px; height:32px; border-radius:50%;
    background:#ffffff; cursor:pointer; transition: all 0.2s ease;
    position: relative; border: 2px solid #cbd5e1;
  }

  /* [2. 내가 선택한 좌석 - 체크표시와 함께 확실한 남색] */
  .seat.selected { 
    background:#1a304d !important; 
    border-color: #1a304d !important;
    transform: scale(1.1);
  }
  .seat.selected::after {
    content: '✓'; color: white; font-size: 16px; font-weight: bold;
    position: absolute; top:50%; left:50%; transform: translate(-50%, -50%);
  }
  
  /* [3. 이미 눌러져있는 자리 - '안 어두운 회색'으로 확실히 구분] */
  .seat.disabled { 
    background:#94a3b8 !important; /* 중간 톤의 회색으로 변경 */
    border-color: #94a3b8 !important;
    cursor:default; 
  }

  /* [4. 마지막 한 자리 강조 - 세련된 하늘색 광채] */
  .seat.last-glow:not(.disabled):not(.selected) {
    background-color: #f0f9ff !important;
    border: 3px solid #38bdf8 !important;
    animation: gentle-pulse 2s infinite ease-in-out !important;
  }

  @keyframes gentle-pulse {
    0% { transform: scale(1); box-shadow: 0 0 5px rgba(56, 189, 248, 0.4); }
    50% { transform: scale(1.1); box-shadow: 0 0 15px rgba(56, 189, 248, 0.7); }
    100% { transform: scale(1); box-shadow: 0 0 5px rgba(56, 189, 248, 0.4); }
  }

  .selected-seat { font-weight:700; margin-bottom:30px; color: #1a304d; font-size: 18px; }
  .reserve-btn {
    padding:16px 40px; background:#1a304d; color:#fff;
    border:none; border-radius:12px; cursor:pointer; font-size:16px; font-weight:700;
  }
</style>
</head>
<body>

<div class="seat-container">
  <h2>STEP 2. 좌석 선택</h2>
  <div class="stage">STAGE</div>
  <div class="seat-grid" id="seatGrid"></div>
  <div class="selected-seat" id="selectedSeat">선택 좌석: 없음</div>
  <button class="reserve-btn" onclick="confirmSeat()">다음 단계</button>
</div>

<script>
  // (스크립트 로직은 이전과 동일하므로 생략하지 않고 그대로 유지)
  const seatGrid = document.getElementById('seatGrid');
  const selectedSeat = document.getElementById('selectedSeat');
  const rows = 10;
  const cols = 12;
  const disabledSeats = ['1-3','1-5','2-2','2-6','3-4','3-7','7-3','7-5','7-7','8-2','8-8','9-4','9-6','10-3','10-7','10-10'];
  const hRow = 8;
  const hCol = 6;
  const seats = [];

  for(let r=1; r<=rows; r++){
    for(let c=1; c<=cols; c++){
      const seat = document.createElement('div');
      seat.className = 'seat';
      seat.dataset.row = r;
      seat.dataset.col = c;
      const seatKey = r + '-' + c;
      if(disabledSeats.includes(seatKey)) seat.classList.add('disabled');

      seat.addEventListener('click', () => {
        if(seat.classList.contains('disabled')) return;
        if(r === hRow && c === hCol){
          document.querySelectorAll('.seat.selected').forEach(s => s.classList.remove('selected'));
          seat.classList.add('selected');
          selectedSeat.textContent = '선택 좌석: H22';
        } else {
          alert('[이미 선택된 좌석입니다.]');
          animateSeatsRandom();
        }
      });
      seats.push(seat);
      seatGrid.appendChild(seat);
    }
  }

  function animateSeatsRandom(){
    const seatsToAnimate = seats.filter(s => {
      const r = parseInt(s.dataset.row);
      const c = parseInt(s.dataset.col);
      return !(r===hRow && c===hCol) && !s.classList.contains('disabled');
    });
    for(let i=seatsToAnimate.length -1; i>0; i--){
      const j = Math.floor(Math.random() * (i+1));
      [seatsToAnimate[i], seatsToAnimate[j]] = [seatsToAnimate[j], seatsToAnimate[i]];
    }
    seatsToAnimate.forEach((s, idx) => {
      setTimeout(()=> {
        s.classList.add('disabled');
        s.classList.remove('last-glow');
        checkLastOne();
      }, idx * 15);
    });
  }

  function checkLastOne() {
    const availableSeats = seats.filter(s => !s.classList.contains('disabled'));
    if (availableSeats.length === 1 && !availableSeats[0].classList.contains('selected')) {
      availableSeats[0].classList.add('last-glow');
    }
  }

  function confirmSeat(){
    if(selectedSeat.textContent.includes('H22')){
        window.location.href = "complete.html"; 
    } else {
        alert('좌석을 선택해주세요.');
    }
  }
</script>
</body>
</html>
