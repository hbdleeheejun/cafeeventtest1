<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>좌석 선택 - JuneJun Birthday Cafe</title>
<style>
  body {
    margin:0; font-family:Pretendard, Arial, sans-serif;
    background:#f0f4f8; display:flex; justify-content:center; align-items:center;
    min-height:100vh;
  }
  .seat-container {
    background:#fff; padding:32px; border-radius:16px;
    text-align:center; max-width:960px; box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  }
  h2 { margin-bottom:24px; color: #24426b; }
  .stage { 
    background:#d3d6dd; font-weight:700; padding:16px;
    border-radius:8px; margin:0 auto 24px auto; width:50%; color: #555;
  }
  .seat-grid {
    display:grid; grid-template-columns: repeat(12, 28px);
    gap:10px; justify-content:center; margin-bottom:24px;
  }
  .seat {
    width:28px; height:28px; border-radius:50%;
    background:#dbe2ef; cursor:pointer; transition: all 0.2s;
    position: relative;
  }

  /* 선택된 좌석 (H22) */
  .seat.selected { background:#24426b !important; transform: scale(1.1); border: 2px solid #1a304d; }
  
  /* 비활성화된 좌석 (회색) */
  .seat.disabled { background:#a3a3a3 !important; cursor:default; border: none !important; animation: none !important; }

  /* ✨ 세련된 마지막 좌석 강조 (블루 광채) */
  .seat.last-seat:not(.disabled) {
    background-color: #ffffff !important;
    border: 2px solid #3498db !important;
    animation: soft-glow 1.5s infinite ease-in-out !important;
    z-index: 10;
  }

  @keyframes soft-glow {
    0% { transform: scale(1); box-shadow: 0 0 5px rgba(52, 152, 219, 0.5); }
    50% { transform: scale(1.2); box-shadow: 0 0 20px rgba(52, 152, 219, 0.9); border-color: #2980b9 !important; }
    100% { transform: scale(1); box-shadow: 0 0 5px rgba(52, 152, 219, 0.5); }
  }

  .selected-seat { font-weight:700; margin-bottom:24px; color: #24426b; height: 20px; }
  .reserve-btn {
    padding:12px 24px; background:#24426b; color:#fff;
    border:none; border-radius:12px; cursor:pointer; font-size:16px; font-weight:700;
  }
  .reserve-btn:hover { background:#1e3560; }
</style>
</head>
<body>

<div class="seat-container">
  <h2>STEP 2. 좌석 선택</h2>
  <div class="stage">STAGE</div>
  <div class="seat-grid" id="seatGrid"></div>
  <div class="selected-seat" id="selectedSeat">선택 좌석: 없음</div>
  <button class="reserve-btn" onclick="confirmSeat()">다음 단계</button>
</div>

<script>
  const seatGrid = document.getElementById('seatGrid');
  const selectedSeat = document.getElementById('selectedSeat');

  const rows = 10;
  const cols = 12;
  const disabledSeats = ['1-3','1-5','2-2','2-6','3-4','3-7','7-3','7-5','7-7','8-2','8-8','9-4','9-6','10-3','10-7','10-10'];
  
  const hRow = 8;
  const hCol = 6;
  const seats = [];

  // 좌석 생성
  for(let r=1; r<=rows; r++){
    for(let c=1; c<=cols; c++){
      const seat = document.createElement('div');
      seat.className = 'seat';
      seat.dataset.row = r;
      seat.dataset.col = c;
      const seatKey = r + '-' + c;

      if(disabledSeats.includes(seatKey)){
        seat.classList.add('disabled');
      }

      seat.addEventListener('click', () => {
        // 이미 비활성화된 좌석은 무시
        if(seat.classList.contains('disabled')) return;

        if(r === hRow && c === hCol){
          // H22 선택 가능하게 수정
          document.querySelectorAll('.seat.selected').forEach(s => s.classList.remove('selected'));
          seat.classList.add('selected');
          selectedSeat.textContent = '선택 좌석: H22';
        } else {
          alert('[이미 선택된 좌석입니다.]');
          animateSeatsRandom();
        }
      });

      seats.push(seat);
      seatGrid.appendChild(seat);
    }
  }

  function animateSeatsRandom(){
    const seatsToAnimate = seats.filter(s => {
      const r = parseInt(s.dataset.row);
      const c = parseInt(s.dataset.col);
      return !(r===hRow && c===hCol) && !s.classList.contains('disabled');
    });

    for(let i=seatsToAnimate.length -1; i>0; i--){
      const j = Math.floor(Math.random() * (i+1));
      [seatsToAnimate[i], seatsToAnimate[j]] = [seatsToAnimate[j], seatsToAnimate[i]];
    }

    seatsToAnimate.forEach((s, idx) => {
      setTimeout(()=> {
        s.classList.add('disabled');
        // 애니메이션 도중 주황색 클래스가 붙지 않도록 확실히 처리
        s.classList.remove('last-seat'); 
        checkLastOne();
      }, idx * 15);
    });
  }

  function checkLastOne() {
    const availableSeats = seats.filter(s => !s.classList.contains('disabled'));
    if (availableSeats.length === 1) {
      // 오직 H22만 남았을 때만 강조 클래스 추가
      availableSeats[0].classList.add('last-seat');
    }
  }

  function confirmSeat(){
    // 텍스트 내용으로 체크하므로 오타 주의
    if(selectedSeat.textContent === '선택 좌석: H22'){
        // 이동할 페이지 이름을 확인하세요. (예: complete.html)
        window.location.href = "complete.html"; 
    } else {
        alert('좌석을 선택해주세요.');
    }
  }
</script>

</body>
</html>
